document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

argin:0;color:#2a2724;letter-spacing:-.01em;\">Website Chat Concierge<\u002Fh1>\n      <p style=\"font:400 15px/1.5 system-ui,sans-serif;margin:12px 0 0;max-width:640px;color:#6b6455;\">Floating chat widget for a small German hotel — guests describe what they want, the assistant answers, shows matching rooms as photo cards, and hands off a payment link. Text-first, German/English auto-detected, grounded in live tool calls.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:9px;font:400 12px/1.3 system-ui,sans-serif;color:#6b6455;border:1.5px solid #cbc0ad;border-radius:12px;padding:16px 18px;background:#f4efe4;\">\n      <div style=\"font:600 10px/1 ui-monospace,monospace;letter-spacing:.16em;text-transform:uppercase;color:#8a8172;margin-bottom:3px;\">Legend<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:9px;\"><span style=\"width:22px;height:14px;border:1.5px solid #33302b;background:#fbf8f2;border-radius:3px;display:inline-block;\"><\u002Fspan>Wireframe element<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:9px;\"><span style=\"width:22px;height:14px;border:1.5px solid #33302b;border-radius:3px;background:repeating-linear-gradient(45deg,#ddd4c4 0 6px,#e8dfd0 6px 12px);display:inline-block;\"><\u002Fspan>Image placeholder<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:9px;\"><span style=\"font:600 16px/1 'Caveat',cursive;color:#b5763a;\">abc<\u002Fspan>Hand annotation<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"height:2px;background:repeating-linear-gradient(90deg,#33302b 0 10px,transparent 10px 18px);opacity:.35;margin:26px 0 40px;\"><\u002Fdiv>\n\n  <!-- ============ BAND 01 — GUEST-FACING UI ============ -->\n  <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:28px;\">\n    <span style=\"font:700 15px/1 ui-monospace,monospace;color:#fbf8f2;background:#33302b;border-radius:8px;padding:9px 12px;\">01<\u002Fspan>\n    <h2 style=\"font:600 24px/1 'Space Grotesk',sans-serif;margin:0;color:#2a2724;\">Guest-facing UI<\u002Fh2>\n    <span style=\"font:400 13px/1 system-ui,sans-serif;color:#8a8172;\">the widget, the room cards, and the moments that matter<\u002Fspan>\n  <\u002Fdiv>\n\n  <div style=\"display:flex;flex-wrap:wrap;gap:40px 44px;align-items:flex-start;\">\n\n    <!-- G1 · Collapsed widget on a page -->\n    <div style=\"display:flex;flex-direction:column;gap:12px;\">\n      <div style=\"display:flex;align-items:baseline;gap:9px;\"><span style=\"font:600 10px/1 ui-monospace,monospace;color:#8a8172;background:#ded4c2;border-radius:5px;padding:4px 7px;\">G1<\u002Fspan><span style=\"font:500 13px/1 'Space Grotesk',sans-serif;color:#514b3f;\">Collapsed widget on any page<\u002Fspan><\u002Fdiv>\n      <div style=\"width:432px;background:#fbf8f2;border:1.5px solid #33302b;border-radius:14px;box-shadow:5px 5px 0 rgba(51,48,43,.10);overflow:hidden;\">\n        <div style=\"display:flex;align-items:center;gap:7px;padding:10px 12px;border-bottom:1.5px solid #33302b;background:#f1ebdf;\">\n          <span style=\"width:9px;height:9px;border-radius:50%;border:1.5px solid #33302b;\"><\u002Fspan>\n          <span style=\"width:9px;height:9px;border-radius:50%;border:1.5px solid #33302b;\"><\u002Fspan>\n          <span style=\"width:9px;height:9px;border-radius:50%;border:1.5px solid #33302b;\"><\u002Fspan>\n          <span style=\"flex:1;margin-left:8px;border:1.5px solid #33302b;border-radius:999px;padding:4px 10px;font:400 10px/1 ui-monospace,monospace;color:#8a8172;background:#fff;\">hotel-loewen-bacharach.de<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"position:relative;padding:16px;height:300px;background:#fbf8f2;\">\n          <div style=\"height:118px;border:1.5px solid #33302b;border-radius:10px;background:repeating-linear-gradient(45deg,#ddd4c4 0 7px,#e8dfd0 7px 14px);display:flex;align-items:center;justify-content:center;font:400 11px/1 ui-monospace,monospace;color:#8a8172;\">hero image<\u002Fdiv>\n          <div style=\"height:11px;width:62%;background:#e0d7c7;border-radius:3px;margin-top:16px;\"><\u002Fdiv>\n          <div style=\"height:11px;width:80%;background:#e8e0d1;border-radius:3px;margin-top:9px;\"><\u002Fdiv>\n          <div style=\"height:11px;width:48%;background:#e8e0d1;border-radius:3px;margin-top:9px;\"><\u002Fdiv>\n          <div style=\"display:flex;gap:12px;margin-top:18px;\">\n            <div style=\"flex:1;height:52px;border:1.5px dashed #c3b8a4;border-radius:8px;\"><\u002Fdiv>\n            <div style=\"flex:1;height:52px;border:1.5px dashed #c3b8a4;border-radius:8px;\"><\u002Fdiv>\n          <\u002Fdiv>\n          <!-- greeting toast -->\n          <div style=\"position:absolute;right:16px;bottom:78px;max-width:190px;background:#33302b;color:#f4efe6;border-radius:12px 12px 2px 12px;padding:10px 12px;font:400 11.5px/1.4 system-ui,sans-serif;box-shadow:3px 3px 0 rgba(51,48,43,.18);\">Hallo! Fragen zu Zimmern oder Ihrer Buchung?<\u002Fdiv>\n          <!-- launcher -->\n          <div style=\"position:absolute;right:16px;bottom:16px;width:54px;height:54px;border-radius:50%;background:#b5763a;border:1.5px solid #33302b;box-shadow:3px 3px 0 rgba(51,48,43,.18);display:flex;align-items:center;justify-content:center;\">\n            <span style=\"font:400 24px/1 system-ui;color:#fbf8f2;\">💬<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font:600 15px/1.25 'Caveat',cursive;color:#b5763a;max-width:400px;{{ annStyle }}\">↑ lives on every page — one launcher, non-intrusive, greets in the guest's language<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- G2 · Open chat + room cards (HERO) -->\n    <div style=\"display:flex;flex-direction:column;gap:12px;\">\n      <div style=\"display:flex;align-items:baseline;gap:9px;\"><span style=\"font:600 10px/1 ui-monospace,monospace;color:#fbf8f2;background:#b5763a;border-radius:5px;padding:4px 7px;\">G2<\u002Fspan><span style=\"font:500 13px/1 'Space Grotesk',sans :2px 2px 0 rgba(51,48,43,.10);\">\n            <div style=\"height:98px;background:repeating-linear-gradient(45deg,#d7cdbb 0 7px,#e3dacb 7px 14px);border-bottom:1.5px solid #33302b;display:flex;align-items:center;justify-content:center;font:400 10px/1 ui-monospace,monospace;color:#8a8172;\">room photo · Rheinblick<\u002Fdiv>\n            <div style=\"padding:10px 11px;\">\n              <div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:8px;\"><span style=\"font:600 12.5px/1.2 'Space Grotesk',sans-serif;color:#2a2724;\">Zimmer Rheinblick<\u002Fspan><span style=\"font:600 12.5px/1 'Space Grotesk',sans-serif;color:#33302b;\">€138<span style=\"font:400 9px/1 system-ui;color:#8a8172;\">/Nacht<\u002Fspan><\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;\">\n                <span style=\"font:400 9.5px/1 ui-monospace,monospace;color:#514b3f;border:1.5px solid #cbc0ad;border-radius:999px;padding:3px 7px;\">Kingsize<\u002Fspan>\n                <span style=\"font:400 9.5px/1 ui-monospace,monospace;color:#514b3f;border:1.5px solid #cbc0ad;border-radius:999px;padding:3px 7px;\">Flussblick<\u002Fspan>\n                <span style=\"font:400 9.5px/1 ui-monospace,monospace;color:#514b3f;border:1.5px solid #cbc0ad;border-radius:999px;padding:3px 7px;\">28 m²<\u002Fspan>\n                <span style=\"font:400 9.5px/1 ui-monospace,monospace;color:#514b3f;border:1.5px solid #cbc0ad;border-radius:999px;padding:3px 7px;\">ruhig<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"margin-top:10px;border:1.5px solid #33302b;border-radius:999px;padding:6px 0;text-align:center;font:600 11px/1 'Space Grotesk',sans-serif;color:#33302b;background:#f4efe4;\">Details ansehen<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- room card B (condensed) -->\n          <div style=\"border:1.5px solid #33302b;border-radius:12px;overflow:hidden;background:#fff;box-shadow:2px 2px an style=\"font:600 10.5px/1 'Space Grotesk',sans-serif;color:#fbf8f2;background:#33302b;border-radius:999px;padding:6px 11px;\">Zahlen ↗<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"border:1.5px solid #33302b;border-radius:11px;background:#fff;padding:11px 12px;display:flex;align-items:center;gap:11px;box-shadow:2px 2px 0 rgba(51,48,43,.10);\">\n            <div style=\"width:36px;height:36px;border-radius:8px;border:1.5px solid #33302b;background:repeating-linear-gradient(45deg,#ddd4c4 0 5px,#e8dfd0 5px 10px);\"><\u002Fdiv>\n            <div style=\"flex:1;\"><div style=\"font:600 12px/1.2 'Space Grotesk',sans-serif;color:#2a2724;\">Gartenzimmer<\u002Fdiv><div style=\"font:400 10px/1 ui-monospace,monospace;color:#8a8172;margin-top:3px;\">€216 · 2 Nächte<\u002Fdiv><\u002Fdiv>\n            <span style=\"font:600 10.5px/1 'Space Grotesk',sans-serif;color:#fbf8f2;background:#33302b;border-radius:999px;padding:6px 11px;\">Zahlen ↗<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:7px;font:400 10.5px/1.3 system-ui,sans-serif;color:#8a8172;border:1.5px dashed #cbc0ad;border-radius:9px;padding:8px 10px;\">🔒 Kartendaten liegen beim Zahlungsanbieter — nie im Chat.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font:600 15px/1.25 'Caveat',cursive;color:#b5763a;max-width:388px;{{ annStyle }}\">↑ group = several links, not an escalation. One <span style=\"font-family:ui-monospace,monospace;font-size:12px;\">create_payment_link<\u002Fspan> per room.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- G5 · Escalation / capture lead -->\n    <div style=\"display:flex;flex-direction:column;gap:12px;\">\n      <div style=\"display:flex;align-items:baseline;gap:9px;\"><span style=\"font:600 10px/1 ui-monospace,monospace;color:#8a8172;background:#ded4c2;border-radius:5px;padding:4px 7px;\">G5<\u002Fspan><span style=\"font:500 13px/1 'Space Grotesk',sans-serif;color:#514b3f;\">Dead-end → capture lead &amp; notify staff<\u002Fspan><\u002Fdiv>\n      <div style=\"width:388px;background:#fbf8f2;border:1.5px solid #33302b;border-radius:18px;box-shadow:5px 5px 0 rgba(51,48,43,.10);overflow:hidden;display:flex;flex-direction:column;\">\n        <div style=\"display:flex;align-items:center;gap:9px;padding:12px 14px;border-bottom:1.5px solid #33302b;background:#f1ebdf;\">\n          <div style=\"flex:1;font:600 12.5px/1.1 'Space Grotesk',sans-serif;color:#2a2724;\">An das Team weiterleiten<\u002Fdiv>\n          <span style=\"font:600 9.5px/1 ui-monospace,monospace;color:#33302b;border:1.5px solid #33302b;border-radius:999px;padding:3px 7px;background:#fff;\">EN<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"padding:14px;display:flex;flex-direction:column;gap:11px;\">\n          <div style=\"align-self:flex-end;max-width:82%;background:#33302b;color:#f4efe6;border-radius:13px 4px 13px 13px;padding:9px 12px;font:400 12px/1.45 system-ui,sans-serif;\">We had a bad stay last month and want to discuss a refund.<\u002Fdiv>\n          <div style=\"align-self:flex-start;max-width:90%;background:#efe7d7;border:1.5px solid #33302b;border-radius:4px 13px 13px 13px;padding:9px 12px;font:400 12px/1.45 system-ui,sans-serif;color:#2a2724;\">I'm sorry to hear that. This needs a person on our team. I'll pass on a summary — how can they reach you?<\u002Fdiv>\n          <!-- summary chip -->\n          <div style=\"border:1.5px dashed #b5763a;border-radius:10px;padding:9px 11px;background:#f7efe2;\"><div style=\"font:600 9.5px/1 ui-monospace,monospace;color:#b5763a;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;\">Summary for staff<\u002Fdiv><div style=\"font:400 11px/1.4 system-ui,sans-serif;color:#514b3f;\">Guest requests refund discussion re: stay last month. Sentiment: unhappy. Not resolvable in chat.<\u002Fdiv><\u002Fdiv>\n          <!-- mini form -->\n          <div style=\"display:flex;flex-direction:column;gap:8px;\">\n            <div style=\"border:1.5px solid #33302b;border-radius:8px;padding:8px 11px;font:400 11.5px/1 system-ui,sans-serif;color:#a49a86;background:#fff;\">Name<\u002Fdiv>\n            <div style=\"border:1.5px solid #33302b;border-radius:8px;padding:8px 11px;font:400 11.5px/1 system-ui,sans-serif;color:#a49a86;background:#fff;\">E-Mail or phone<\u002Fdiv>\n            <div style=\"border:1.5px solid #33302b;border-radius:999px;padding:10px 0;text-align:center;font:600 12px/1 'Space Grotesk',sans-serif;color:#fbf8f2;background:#b5763a;box-shadow:2px 2px 0 rgba(51,48,43,.18);\">Send to team<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:7px;font:400 10.5px/1.3 system-ui,sans-serif;color:#4d7a52;border:1.5px solid #bcd0be;border-radius:9px;padding:8px 10px;background:#eef4ee;\">✓ Team notified — email + SMS sent. Someone will reply within the day.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font:600 15px/1.25 'Caveat',cursive;color:#b5763a;max-width:388px;{{ annStyle }}\">↑ the off-hours safety net — <span style=\"font-family:ui-monospace,monospace;font-size:12px;\">capture_lead_and_notify_staff<\u002Fspan> emails + SMSes.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- G6 · Language detection -->\n    <div style=\"display:flex;flex-direction:column;gap:12px;\">\n      <div style=\"display:flex;align-items:baseline;gap:9px;\"><span style=\"font:600 10px/1 ui-monospace,monospace;color:#8a8172;background:#ded4c2;border-radius:5px;padding:4px 7px;\">G6<\u002Fspan><span style=\"font:500 13px/1 'Space Grotesk',sans-serif;color:#514b3f;\">Language auto-detection (per guest)<\u002Fspan><\u002Fdiv>\n      <div style=\"width:388px;background:#fbf8f2;border:1.5px solid #33302b;border-radius:18px;box-shadow:5px 5px 0 rgba(51,48,43,.10);overflow:hidden;display:flex;flex-direction:column;padding:18px;gap:16px;\">\n        <div style=\"display:flex;flex-direction:column;gap:9px;\">\n          <div style=\"align-self:flex-end;background:#33302b;color:#f4efe6;border-radius:13px 4px 13px 13px;padding:8px 11px;font:400 11.5px/1.4 system-ui,sans-serif;max-width:80%;\">Do you have parking?<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:8px;align-self:flex-end;\"><span style=\"font:400 12px/1 'Caveat',cursive;color:#8a8172;\">detected →<\u002Fspan><span style=\"font:600 9.5px/1 ui-monospace,monospace;color:#33302b;border:1.5px solid #33302b;border-radius:999px;padding:4px 9px;background:#fff;\">EN<\u002Fspan><\u002Fdiv>\n          <div style=\"align-self:flex-start;background:#efe7d7;border:1.5px solid #33302b;border-radius:4px 13px 13px 13px;padding:8px 11px;font:400 11.5px/1.4 system-ui,sans-serif;max-width:82%;\">Yes — free on-site parking for guests.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"height:1.5px;background:repeating-linear-gradient(90deg,#cbc0ad 0 6px,transparent 6px 11px);\"><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:9px;\">\n          <div style=\"align-self:flex-end;background:#33302b;color:#f4efe6;border-radius:13px 4px 13px 13px;padding:8px 11px;font:400 11.5px/1.4 system-ui,sans-serif;max-width:80%;\">Gibt es einen Parkplatz?<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:8px;align-self:flex-end;\"><span style=\"font:400 12px/1 'Caveat',cursive;color:#8a8172;\">erkannt →<\u002Fspan><span style=\"font:600 9.5px/1 ui-monospace,monospace;color:#33302b;border:1.5px solid #33302b;border-radius:999px;padding:4px 9px;background:#fff;\">DE<\u002Fspan><\u002Fdiv>\n          <div style=\"align-self:flex-start;background:#efe7d7;border:1.5px solid #33302b;border-radius:4px 13px 13px 13px;padding:8px 11px;font:400 11.5px/1.4 system-ui,sans-serif;max-width:82%;\">Ja — kostenlose Parkplätze direkt am Haus.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font:600 15px/1.25 'Caveat',cursive;color:#b5763a;max-width:388px;{{ annStyle }}\">↑ same agent, detected from the guest's own words — no language switcher to hunt for.<\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <div style=\"height:2px;background:repeating-linear-gradient(90deg,#33302b 0 10px,transparent 10px 18px);opacity:.35;margin:52px 0 40px;\"><\u002Fdiv>\n\n  <!-- ============ BAND 02 — ARCHITECTURE ============ -->\n  <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:30px;\">\n    <span style=\"font:700 15px/1 ui-monospace,monospace;color:#fbf8f2;background:#33302b;border-radius:8px;padding:9px 12px;\">02<\u002Fspan>\n    <h2 style=\"font:600 24px/1 'Space Grotesk',sans-serif;margin:0;color:#2a2724;\">System architecture<\u002Fh2>\n    <span style=\"font:400 13px/1 system-ui,sans-serif;color:#8a8172;\">one agent · one transport (the website) · one actions layer<\u002Fspan>\n  <\u002Fdiv>\n\n  <div style=\"display:flex;flex-direction:{{ archDir }};align-items:{{ archAlign }};gap:0;flex-wrap:nowrap;\">\n\n    <!-- widget -->\n    <div style=\"width:230px;flex:none;border:1.5px solid #33302b;border-radius:14px;background:#fbf8f2;box-shadow:4px 4px 0 rgba(51,48,43,.10);padding:16px;display:flex;flex-direction:column;gap:9px;\">\n      <div style=\"font:600 10px/1 ui-monospace,monospace;color:#8a8172;letter-spacing:.12em;text-transform:uppercase;\">Transport<\u002Fdiv>\n      <div style=\"font:600 15px/1.2 'Space Grotesk',sans-serif;color:#2a2724;\">Website widget<\u002Fdiv>\n      <div style=\"font:400 11.5px/1.45 system-ui,sans-serif;color:#6b6455;\">Floating chat on every page. Renders prose <b>and<\u002Fb> structured photo cards. Text-first; voice optional.<\u002Fdiv>\n      <div style=\"margin-top:auto;display:flex;gap:6px;flex-wrap:wrap;\"><span style=\"font:400 9px/1 ui-monospace,monospace;color:#514b3f;border:1.5px solid #cbc0ad;border-radius:999px;padding:3px 6px;\">DE / EN<\u002Fspan><span style=\"font:400 9px/1 ui-monospace,monospace;color:#514b3f;border:1.5px solid #cbc0ad;border-radius:999px;padding:3px 6px;\">cards<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"{{ connStyle }}\"><span style=\"font:400 10px/1.2 'Caveat',cursive;color:#8a8172;text-align:center;margin-bottom:2px;\">chat<\u002Fspan><span style=\"font:400 26px/1 'Space Grotesk',sans-serif;color:#b5763a;\">{{ arrow }}<\u002Fspan><\u002Fdiv>\n\n    <!-- agent -->\n    <div style=\"width:230px;flex:none;border:1.5px solid #33302b;border-radius:14px;background:#fbf8f2;box-shadow:4px 4px 0 rgba(51,48,43,.10);padding:16px;display:flex;flex-direction:column;gap:9px;\">\n      <div style=\"font:600 10px/1 ui-monospace,monospace;color:#8a8172;letter-spacing:.12em;text-transform:uppercase;\">Brain<\u002Fdiv>\n      <div style=\"font:600 15px/1.2 'Space Grotesk',sans-serif;color:#2a2724;\">The agent · LLM<\u002Fdiv>\n      <div style=\"font:400 11.5px/1.45 system-ui,sans-serif;color:#6b6455;\">Holds hotel identity &amp; behaviour, detects language, decides when to call a tool, composes prose + structured data.<\u002Fdiv>\n      <div style=\"margin-top:auto;display:flex;gap:6px;flex-wrap:wrap;\"><span style=\"font:400 9px/1 ui-monospace,monospace;color:#514b3f;border:1.5px solid #cbc0ad;border-radius:999px;padding:3px 6px;\">tool calling<\u002Fspan><span style=\"font:400 9px/1 ui-monospace,monospace;color:#514b3f;border:1.5px solid #cbc0ad;border-radius:999px;padding:3px 6px;\">swappable<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"{{ connStyle }}\"><span style=\"font:400 10px/1.2 'Caveat',cursive;color:#8a8172;text-align:center;margin-bottom:2px;\">MCP<\u002Fspan><span style=\"font:400 26px/1 'Space Grotesk',sans-serif;color:#b5763a;\">{{ arrow }}<\u002Fspan><\u002Fdiv>\n\n    <!-- MCP server with tools -->\n    <div style=\"width:270px;flex:none;border:1.5px solid #33302b;border-radius:14px;background:#f4efe4;box-shadow:4px 4px 0 rgba(51,48,43,.12);padding:16px;display:flex;flex-direction:column;gap:10px;\">\n      <div style=\"font:600 10px/1 ui-monospace,monospace;color:#b5763a;letter-spacing:.12em;text-transform:uppercase;\">Actions layer — your code<\u002Fdiv>\n      <div style=\"font:600 15px/1.2 'Space Grotesk',sans-serif;color:#2a2724;\">MCP server · 7 tools<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:5px;\">\n        <div style=\"font:400 10px/1.2 ui-monospace,monospace;color:#33302b;background:#fff;border:1.5px solid #33302b;border-radius:6px;padding:6px 8px;\">search_rooms<\u002Fdiv>\n        <div style=\"font:400 10px/1.2 ui-monospace,monospace;color:#33302b;background:#fff;border:1.5px solid #33302b;border-radius:6px;padding:6px 8px;\">get_room_details<\u002Fdiv>\n        <div style=\"font:400 10px/1.2 ui-monospace,monospace;color:#33302b;background:#fff;border:1.5px solid #33302b;border-radius:6px;padding:6px 8px;\">get_hotel_info<\u002Fdiv>\n        <div style=\"font:400 10px/1.2 ui-monospace,monospace;color:#33302b;background:#fff;border:1.5px solid #33302b;border-radius:6px;padding:6px 8px;\">check_promotions<\u002Fdiv>\n        <div style=\"font:400 10px/1.2 ui-monospace,monospace;color:#33302b;background:#fff;border:1.5px solid #33302b;border-radius:6px;padding:6px 8px;\">get_local_recommendations<\u002Fdiv>\n        <div style=\"font:400 10px/1.2 ui-monospace,monospace;color:#33302b;background:#fff;border:1.5px solid #33302b;border-radius:6px;padding:6px 8px;\">create_payment_link<\u002Fdiv>\n        <div style=\"font:400 10px/1.2 ui-monospace,monospace;color:#33302b;background:#fff;border:1.5px solid #33302b;border-radius:6px;padding:6px 8px;\">capture_lead_and_notify_staff<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"{{ connStyle }}\"><span style=\"font:400 10px/1.2 'Caveat',cursive;color:#8a8172;text-align:center;margin-bottom:2px;\">integrate<\u002Fspan><span style=\"font:400 26px/1 'Space Grotesk',sans-serif;color:#b5763a;\">{{ arrowLast }}<\u002Fspan><\u002Fdiv>\n\n    <!-- sources of truth -->\n    <div style=\"width:250px;flex:none;display:flex;flex-direction:column;gap:12px;\">\n      <div style=\"border:1.5px solid #33302b;border-radius:12px;background:#fbf8f2;box-shadow:4px 4px 0 rgba(51,48,43,.10);padding:13px 14px;\">\n        <div style=\"font:600 13px/1.2 'Space Grotesk',sans-serif;color:#2a2724;\">PMS / booking engine<\u002Fdiv>\n        <div style=\"font:400 10.5px/1.4 system-ui,sans-serif;color:#6b6455;margin-top:4px;\">Source of truth — live availability &amp; prices, read on demand.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border:1.5px solid #33302b;border-radius:12px;background:#fbf8f2;box-shadow:4px 4px 0 rgba(51,48,43,.10);padding:13px 14px;\">\n        <div style=\"font:600 13px/1.2 'Space Grotesk',sans-serif;color:#2a2724;\">Payment provider<\u002Fdiv>\n        <div style=\"font:400 10.5px/1.4 system-ui,sans-serif;color:#6b6455;margin-top:4px;\">Generates payment links. Card data stays here — never in the chat.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border:1.5px solid #33302b;border-radius:12px;background:#fbf8f2;box-shadow:4px 4px 0 rgba(51,48,43,.10);padding:13px 14px;\">\n        <div style=\"font:600 13px/1.2 'Space Grotesk',sans-serif;color:#2a2724;\">Email + SMS gateway<\u002Fdiv>\n        <div style=\"font:400 10.5px/1.4 system-ui,sans-serif;color:#6b6455;margin-top:4px;\">Staff notifications for escalations &amp; captured leads.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- grounding note -->\n  <div style=\"margin-top:26px;display:flex;gap:14px;align-items:stretch;flex-wrap:wrap;\">\n    <div style=\"flex:1;min-width:340px;border:1.5px dashed #b5763a;border-radius:12px;background:#f7efe2;padding:14px 16px;display:flex;align-items:center;gap:12px;\">\n      <span style=\"font:400 22px/1 system-ui;\">⚓<\u002Fspan>\n      <div><div style=\"font:600 12.5px/1.2 'Space Grotesk',sans-serif;color:#2a2724;\">Grounding — nothing invented<\u002Fdiv><div style=\"font:400 11.5px/1.45 system-ui,sans-serif;color:#6b6455;margin-top:3px;\">Every room, price, date &amp; policy shown comes from a tool call made in <i>that<\u002Fi> conversation — never from the model's memory. A hallucinated rate is a real business problem, so this is a hard rule.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;min-width:340px;border:1.5px dashed #cbc0ad;border-radius:12px;background:#f4efe4;padding:14px 16px;display:flex;align-items:center;gap:12px;\">\n      <span style=\"font:400 22px/1 system-ui;\">🧩<\u002Fspan>\n      <div><div style=\"font:600 12.5px/1.2 'Space Grotesk',sans-serif;color:#2a2724;\">Grow by adding tools<\u002Fdiv><div style=\"font:400 11.5px/1.45 system-ui,sans-serif;color:#6b6455;margin-top:3px;\">New abilities = new MCP tools. The chat UI and the agent don't change when you add one. The LLM can be swapped without touching the tools.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"height:2px;background:repeating-linear-gradient(90deg,#33302b 0 10px,transparent 10px 18px);opacity:.35;margin:52px 0 40px;\"><\u002Fdiv>\n\n  <!-- ============ BAND 03 — ROADMAP ============ -->\n  <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:34px;\">\n    <span style=\"font:700 15px/1 ui-monospace,monospace;color:#fbf8f2;background:#33302b;border-radius:8px;padding:9px 12px;\">03<\u002Fspan>\n    <h2 style=\"font:600 24px/1 'Space Grotesk',sans-serif;margin:0;color:#2a2724;\">Phased build order<\u002Fh2>\n    <span style=\"font:400 13px/1 system-ui,sans-serif;color:#8a8172;\">each phase ships something testable — value first, money &amp; staff systems later<\u002Fspan>\n  <\u002Fdiv>\n\n  <div style=\"position:relative;display:flex;flex-direction:{{ roadDir }};gap:{{ roadGap }};align-items:stretch;\">\n    <!-- track line -->\n    <div style=\"{{ trackStyle }}\"><\u002Fdiv>\n\n    <!-- phase card helper repeated -->\n    <div style=\"flex:1;display:flex;flex-direction:column;gap:12px;position:relative;\">\n      <div style=\"width:52px;height:52px;border-radius:50%;border:1.5px solid #33302b;background:#b5763a;color:#fbf8f2;display:flex;align-items:center;justify-content:center;font:700 20px/1 'Space Grotesk',sans-serif;box-shadow:3px 3px 0 rgba(51,48,43,.16);\">1<\u002Fdiv>\n      <div style=\"border:1.5px solid #33302b;border-radius:12px;background:#fbf8f2;box-shadow:4px 4px 0 rgba(51,48,43,.10);padding:14px;flex:1;\">\n        <div style=\"font:600 14px/1.2 'Space Grotesk',sans-serif;color:#2a2724;\">MCP server — read tools<\u002Fdiv>\n        <div style=\"font:400 11.5px/1.5 system-ui,sans-serif;color:#6b6455;margin-top:7px;\">Build &amp; test the read tools against the real PMS with a text-only client. Nail the structured room data — photos, attributes, live prices.<\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:5px;margin-top:11px;\"><span style=\"font:400 9px/1 ui-monospace,monospace;color:#514b3f;border:1.5px solid #cbc0ad;border-radius:5px;padding:4px 6px;\">search_rooms<\u002Fspan><span style=\"font:400 9px/1 ui-monospace,monospace;color:#514b3f;border:1.5px solid #cbc0ad;border-radius:5px;padding:4px 6px;\">get_room_details<\u002Fspan><span style=\"font:400 9px/1 ui-monospace,monospace;color:#514b3f;border:1.5px solid #cbc0ad;border-radius:5px;padding:4px 6px;\">get_hotel_info<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"flex:1;display:flex;flex-direction:column;gap:12px;position:relative;\">\n      <div style=\"width:52px;height:52px;border-radius:50%;border:1.5px solid #33302b;background:#fbf8f2;color:#33302b;display:flex;align-items:center;justify-content:center;font:700 20px/1 'Space Grotesk',sans-serif;box-shadow:3px 3px 0 rgba(51,48,43,.12);\">2<\u002Fdiv>\n      <div style=\"border:1.5px solid #33302b;border-radius:12px;background:#fbf8f2;box-shadow:4px 4px 0 rgba(51,48,43,.10);padding:14px;flex:1;\">\n        <div style=\"font:600 14px/1.2 'Space Grotesk',sans-serif;color:#2a2724;\">Text agent<\u002Fdiv>\n        <div style=\"font:400 11.5px/1.5 system-ui,sans-serif;color:#6b6455;margin-top:7px;\">Wrap an LLM around those tools with hotel identity + behaviour and DE/EN auto-detection. Test the whole conversation in plain text.<\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:5px;margin-top:11px;\"><span style=\"font:400 9px/1 ui-monospace,monospace;color:#514b3f;border:1.5px solid #cbc0ad;border-radius:5px;padding:4px 6px;\">grounding<\u002Fspan><span style=\"font:400 9px/1 ui-monospace,monospace;color:#514b3f;border:1.5px solid #cbc0ad;border-radius:5px;padding:4px 6px;\">escalation logic<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"flex:1;display:flex;flex-direction:column;gap:12px;position:relative;\">\n      <div style=\"width:52px;height:52px;border-radius:50%;border:1.5px solid #33302b;background:#fbf8f2;color:#33302b;display:flex;align-items:center;justify-content:center;font:700 20px/1 'Space Grotesk',sans-serif;box-shadow:3px 3px 0 rgba(51,48,43,.12);\">3<\u002Fdiv>\n      <div style=\"border:1.5px solid #33302b;border-radius:12px;background:#fbf8f2;box-shadow:4px 4px 0 rgba(51,48,43,.10);padding:14px;flex:1;\">\n        <div style=\"font:600 14px/1.2 'Space Grotesk',sans-serif;color:#2a2724;\">Chat widget + photo cards<\u002Fdiv>\n        <div style=\"font:400 11.5px/1.5 system-ui,sans-serif;color:#6b6455;margin-top:7px;\">Build the floating widget and card rendering — filtered photo cards, in-chat expansion. The visual product comes to life. Still text-only.<\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:5px;margin-top:11px;\"><span style=\"font:400 9px/1 ui-monospace,monospace;color:#514b3f;border:1.5px solid #cbc0ad;border-radius:5px;padding:4px 6px;\">card contract<\u002Fspan><span style=\"font:400 9px/1 ui-monospace,monospace;color:#514b3f;border:1.5px solid #cbc0ad;border-radius:5px;padding:4px 6px;\">embeddable<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"flex:1;display:flex;flex-direction:column;gap:12px;position:relative;\">\n      <div style=\"width:52px;height:52px;border-radius:50%;border:1.5px solid #33302b;background:#fbf8f2;color:#33302b;display:flex;align-items:center;justify-content:center;font:700 20px/1 'Space Grotesk',sans-serif;box-shadow:3px 3px 0 rgba(51,48,43,.12);\">4<\u002Fdiv>\n      <div style=\"border:1.5px solid #33302b;border-radius:12px;background:#fbf8f2;box-shadow:4px 4px 0 rgba(51,48,43,.10);padding:14px;flex:1;\">\n        <div style=\"font:600 14px/1.2 'Space Grotesk',sans-serif;color:#2a2724;\">Booking + escalation<\u002Fdiv>\n        <div style=\"font:400 11.5px/1.5 system-ui,sans-serif;color:#6b6455;margin-top:7px;\">Add payment links (single + multi-room) and lead capture (email + SMS). Now the assistant can close a booking and hand off cleanly.<\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:5px;margin-top:11px;\"><span style=\"font:400 9px/1 ui-monospace,monospace;color:#514b3f;border:1.5px solid #cbc0ad;border-radius:5px;padding:4px 6px;\">create_payment_link<\u002Fspan><span style=\"font:400 9px/1 ui-monospace,monospace;color:#514b3f;border:1.5px solid #cbc0ad;border-radius:5px;padding:4px 6px;\">notify_staff<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"flex:1;display:flex;flex-direction:column;gap:12px;position:relative;\">\n      <div style=\"width:52px;height:52px;border-radius:50%;border:1.5px solid #33302b;background:#fbf8f2;color:#33302b;display:flex;align-items:center;justify-content:center;font:700 20px/1 'Space Grotesk',sans-serif;box-shadow:3px 3px 0 rgba(51,48,43,.12);\">5<\u002Fdiv>\n      <div style=\"border:1.5px solid #33302b;border-radius:12px;background:#fbf8f2;box-shadow:4px 4px 0 rgba(51,48,43,.10);padding:14px;flex:1;\">\n        <div style=\"font:600 14px/1.2 'Space Grotesk',sans-serif;color:#2a2724;\">Enrich + optional voice<\u002Fdiv>\n        <div style=\"font:400 11.5px/1.5 system-ui,sans-serif;color:#6b6455;margin-top:7px;\">Add promotions &amp; local recommendations. Optionally layer voice I/O on the same agent — test German quality. Further abilities = further tools.<\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:5px;margin-top:11px;\"><span style=\"font:400 9px/1 ui-monospace,monospace;color:#514b3f;border:1.5px solid #cbc0ad;border-radius:5px;padding:4px 6px;\">check_promotions<\u002Fspan><span style=\"font:400 9px/1 ui-monospace,monospace;color:#514b3f;border:1.5px solid #cbc0ad;border-radius:5px;padding:4px 6px;\">voice (opt)<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- vendor footnote -->\n  <div style=\"margin-top:34px;border-top:1.5px dashed #cbc0ad;padding-top:18px;display:flex;gap:12px;align-items:flex-start;max-width:900px;\">\n    <span style=\"font:400 18px/1 system-ui;\">🇪🇺<\u002Fspan>\n    <div style=\"font:400 12px/1.55 system-ui,sans-serif;color:#6b6455;\"><b style=\"color:#2a2724;font-family:'Space Grotesk',sans-serif;\">One quiet vendor note.<\u002Fb> Guest messages &amp; contact details are personal data. For each managed provider (LLM, SMS, payment, hosting) prefer an EU region with a standard data-processing agreement. Keep a transcript for lead/booking context; retain no more than needed. A one-time setup choice at signup.<\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;orientation&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Tall&quot;,&quot;Wide&quot;],&quot;default&quot;:&quot;Tall&quot;,&quot;tsType&quot;:&quot;'Tall' | 'Wide'&quot;,&quot;section&quot;:&quot;Layout&quot;},\n  &quot;showAnnotations&quot;: {&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Layout&quot;}\n}\">class Component extends DCLogic {\n  renderVals() {\n    const wide = (this.props.orientation ?? 'Tall') === 'Wide';\n    const ann = (this.props.showAnnotations ?? true);\n    return {\n      rootStyle: wide ? 'min-width:2680px;' : 'max-width:1180px;margin:0 auto;',\n      archDir: wide ? 'row' : 'column',\n      archAlign: wide ? 'stretch' : 'center',\n      connStyle: wide\n        ? 'flex:none;width:56px;display:flex;flex-direction:column;align-items:center;justify-content:center;'\n        : 'flex:none;width:100%;display:flex;flex-direction:row;align-items:center;justify-content:center;padding:6px 0;gap:10px;',\n      arrow: wide ? '\\u21C4' : '\\u2193',\n      arrowLast: wide ? '\\u2192' : '\\u2193',\n      roadDir: wide ? 'row' : 'column',\n      roadGap: wide ? '22px' : '16px',\n      trackStyle: wide\n        ? 'position:absolute;left:40px;right:40px;top:26px;height:2px;background:repeating-linear-gradient(90deg,#b5763a 0 8px,transparent 8px 15px);'\n        : 'display:none;',\n      annStyle: ann ? '' : 'display:none;',\n    };\n  }\n}<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
